name: Build XD4000 Phase3A Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify repository files
        shell: cmd
        run: |
          dir
          dir app
          dir data
          if not exist requirements.txt exit /b 1
          if not exist app\main.py exit /b 1
          if not exist data\xd4000_phase3a_parameters.csv exit /b 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip show pymodbus
          python -m pip show PyInstaller

      - name: Check Python syntax
        shell: cmd
        run: |
          python -m py_compile app\main.py

      - name: Build EXE
        shell: cmd
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed ^
            --name LK_XD4000_Phase3A_Ethernet_Supervision_Tester ^
            --add-data "data;data" ^
            app\main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LK_XD4000_Phase3A_Ethernet_Supervision_Tester-Windows-EXE
          path: dist/LK_XD4000_Phase3A_Ethernet_Supervision_Tester.exe
          if-no-files-found: error
          retention-days: 30
